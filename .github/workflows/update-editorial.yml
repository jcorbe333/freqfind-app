name: Update Editorial Signals

on:
  schedule:
    - cron: "0 8 * * *" # 8am UTC (3am ET / midnight PT) daily
  workflow_dispatch: # allow manual runs from the GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run editorial scraper
        run: npm run update:editorial

      - name: Commit updated signals
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/editorial-signals.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update editorial signals [skip ci]"
            git push
          fi
